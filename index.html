<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CTRL PAD</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff1a1a;
    --red-dim: #8b0000;
    --red-glow: rgba(255, 26, 26, 0.4);
    --panel: #0d0d0d;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --text: #c8c8c8;
    --text-dim: #555;
    --green: #00ff88;
    --amber: #ffaa00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--panel);
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 16px;
    gap: 12px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .settings-btn:hover { border-color: var(--text); color: var(--text); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }

  /* ── Button Grid ── */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
  }

  /* ── Control Button ── */
  .ctrl-btn {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px;
    overflow: hidden;
    transition: transform 0.08s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .ctrl-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 8px;
  }

  .ctrl-btn:active { transform: scale(0.97); }

  /* Alarm button */
  .ctrl-btn.alarm {
    border-color: var(--red-dim);
    grid-column: 1 / -1; /* Full width */
    grid-row: 1;
  }

  .ctrl-btn.alarm::before {
    background: radial-gradient(ellipse at center, var(--red-glow) 0%, transparent 70%);
  }

  .ctrl-btn.alarm:active::before,
  .ctrl-btn.alarm.firing::before { opacity: 1; }

  .ctrl-btn.alarm .btn-icon {
    font-size: 48px;
    line-height: 1;
    filter: drop-shadow(0 0 12px var(--red));
    transition: filter 0.1s;
  }

  .ctrl-btn.alarm.firing .btn-icon {
    animation: iconPulse 0.5s ease-in-out infinite;
  }

  .ctrl-btn.alarm .btn-label {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--red);
    text-shadow: 0 0 20px var(--red), 0 0 40px var(--red-glow);
    text-transform: uppercase;
    transition: text-shadow 0.1s;
  }

  .ctrl-btn.alarm.firing .btn-label {
    animation: labelFlash 0.5s ease-in-out infinite;
  }

  .ctrl-btn.alarm .btn-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--red-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Corner accent lines on alarm button */
  .ctrl-btn.alarm::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .ctrl-btn.alarm.firing::after { opacity: 1; animation: scanline 1s linear infinite; }

  /* Empty/placeholder buttons */
  .ctrl-btn.empty {
    border-style: dashed;
    opacity: 0.3;
    cursor: default;
  }

  .ctrl-btn.empty .btn-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── Screen flash overlay ── */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255, 26, 26, 0.15);
    pointer-events: none;
    opacity: 0;
    z-index: 50;
  }

  .flash-overlay.active {
    animation: screenFlash 0.5s ease-in-out infinite;
  }

  /* ── Settings Modal ── */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }

  .modal-bg.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    transform: translateY(20px);
    transition: transform 0.25s;
  }

  .modal-bg.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--amber); }

  .field .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 5px;
    line-height: 1.5;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-save {
    flex: 1;
    background: var(--amber);
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 4px;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-save:active { opacity: 0.7; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 12px 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .btn-cancel:active { border-color: var(--text); }

  /* ── Toast notification ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text);
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* ── Animations ── */
  @keyframes iconPulse {
    0%, 100% { filter: drop-shadow(0 0 12px var(--red)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 30px var(--red)); transform: scale(1.1); }
  }

  @keyframes labelFlash {
    0%, 100% { text-shadow: 0 0 20px var(--red), 0 0 40px var(--red-glow); opacity: 1; }
    50% { text-shadow: 0 0 40px var(--red), 0 0 80px var(--red-glow); opacity: 0.7; }
  }

  @keyframes screenFlash {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  @keyframes scanline {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>
<audio id="alarmAudioEl" src="Alarm.mp3" loop preload="auto"></audio>

<div class="app">
  <div class="header">
    <span class="logo">CTRL PAD v1.0</span>
    <div class="status-bar">
      <div class="status-dot">
        <div class="dot" id="lifxDot"></div>
        <span id="lifxStatus">NO TOKEN</span>
      </div>
      <button class="settings-btn" onclick="openSettings()">⚙ CONFIG</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="grid">

    <!-- ALARM BUTTON -->
    <button class="ctrl-btn alarm" id="alarmBtn" ontouchstart="handleAlarm(event)" onclick="handleAlarm(event)">
      <div class="btn-icon">🚨</div>
      <div class="btn-label">ALARM</div>
      <div class="btn-sub">STROBE RED · ALERT TONE</div>
    </button>

    <!-- PLACEHOLDER BUTTONS -->
    <button class="ctrl-btn empty" disabled>
      <div class="btn-label">+ Add Button</div>
    </button>

    <button class="ctrl-btn empty" disabled>
      <div class="btn-label">+ Add Button</div>
    </button>

    <button class="ctrl-btn empty" disabled>
      <div class="btn-label">+ Add Button</div>
    </button>

    <button class="ctrl-btn empty" disabled>
      <div class="btn-label">+ Add Button</div>
    </button>

  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">// Configuration</div>

    <div class="field">
      <label>LIFX API Token</label>
      <input type="password" id="tokenInput" placeholder="Paste your LIFX token here" autocomplete="off">
      <div class="hint">Get yours at: cloud.lifx.com → Settings → Generate Token</div>
    </div>

    <div class="field">
      <label>Light Selector</label>
      <input type="text" id="selectorInput" placeholder="e.g. all  or  label:Strip  or  group:Living Room" autocomplete="off">
      <div class="hint">Use "all" to trigger every light, or target by label/group.</div>
    </div>

    <div class="field">
      <label>Strobe Cycles</label>
      <input type="number" id="cyclesInput" placeholder="10" min="1" max="60" value="10">
      <div class="hint">How many times the light flashes (1–60)</div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">CANCEL</button>
      <button class="btn-save" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let config = {
    token: localStorage.getItem('lifx_token') || '',
    selector: localStorage.getItem('lifx_selector') || 'all',
    cycles: parseInt(localStorage.getItem('lifx_cycles') || '10')
  };

  let isFiring = false;
  let stopFiring = null;
  let toastTimer;

  // ── Audio setup ──
  // 🔊 To swap the sound: rename your file to Alarm.mp3 and upload it
  //    to the same folder as this index.html in your GitHub repo
  const alarmAudio = document.getElementById('alarmAudioEl');
  alarmAudio.loop = true;

  alarmAudio.addEventListener('canplaythrough', () => showToast('AUDIO READY', 'success'));
  alarmAudio.addEventListener('error', () => showToast('AUDIO ERROR — check Alarm.mp3 is in the repo', 'error'));

  // ── Init ──
  updateStatusDot();

  function startAlarmSound() {
    alarmAudio.currentTime = 0;
    alarmAudio.play().catch(err => showToast(`PLAY ERROR: ${err.message}`, 'error'));
  }

  function stopAlarmSound() {
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
  }

  // ── LIFX API ──
  async function triggerLIFXStrobe(start = true) {
    if (!config.token) {
      showToast('NO TOKEN — open Config first', 'error');
      return false;
    }

    const selector = encodeURIComponent(config.selector || 'all');

    if (start) {
      try {
        const res = await fetch(`https://api.lifx.com/v1/lights/${selector}/effects/pulse`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${config.token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            color: 'red',
            from_color: 'black brightness:0%',
            period: 0.5,
            cycles: config.cycles,
            persist: false,
            power_on: true
          })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showToast(`LIFX ERROR: ${err.error || res.status}`, 'error');
          return false;
        }
        return true;
      } catch (e) {
        showToast('LIFX UNREACHABLE', 'error');
        return false;
      }
    } else {
      // Stop effect & turn off
      try {
        await fetch(`https://api.lifx.com/v1/lights/${selector}/effects/off`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${config.token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ power_off: true })
        });
      } catch (e) { /* silent */ }
    }
  }

  // ── Alarm Handler ──
  let touchHandled = false;

  function handleAlarm(e) {
    // Prevent double-fire from touchstart + click
    if (e.type === 'touchstart') { touchHandled = true; }
    if (e.type === 'click' && touchHandled) { touchHandled = false; return; }

    e.preventDefault();

    if (isFiring) {
      endAlarm();
    } else {
      startAlarm();
    }
  }

  function startAlarm() {
    isFiring = true;
    const btn = document.getElementById('alarmBtn');
    const overlay = document.getElementById('flashOverlay');

    btn.classList.add('firing');
    overlay.classList.add('active');
    btn.querySelector('.btn-sub').textContent = 'TAP TO STOP';

    startAlarmSound();
    triggerLIFXStrobe(true);

    // Auto-stop after cycles complete (cycles × 500ms per cycle)
    const autoStop = setTimeout(() => {
      if (isFiring) endAlarm();
    }, config.cycles * 500 + 500);

    stopFiring = () => clearTimeout(autoStop);
  }

  function endAlarm() {
    isFiring = false;
    if (stopFiring) { stopFiring(); stopFiring = null; }

    const btn = document.getElementById('alarmBtn');
    const overlay = document.getElementById('flashOverlay');

    btn.classList.remove('firing');
    overlay.classList.remove('active');
    btn.querySelector('.btn-sub').textContent = 'STROBE RED · ALERT TONE';

    stopAlarmSound();
    triggerLIFXStrobe(false);
  }

  // ── Settings ──
  function openSettings() {
    document.getElementById('tokenInput').value = config.token;
    document.getElementById('selectorInput').value = config.selector;
    document.getElementById('cyclesInput').value = config.cycles;
    document.getElementById('modalBg').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('modalBg').classList.remove('open');
  }

  function saveSettings() {
    const token = document.getElementById('tokenInput').value.trim();
    const selector = document.getElementById('selectorInput').value.trim() || 'all';
    const cycles = parseInt(document.getElementById('cyclesInput').value) || 10;

    config = { token, selector, cycles };
    localStorage.setItem('lifx_token', token);
    localStorage.setItem('lifx_selector', selector);
    localStorage.setItem('lifx_cycles', cycles);

    updateStatusDot();
    closeSettings();
    showToast('CONFIG SAVED', 'success');
  }

  function updateStatusDot() {
    const dot = document.getElementById('lifxDot');
    const label = document.getElementById('lifxStatus');
    if (config.token) {
      dot.className = 'dot online';
      label.textContent = 'LIFX READY';
    } else {
      dot.className = 'dot error';
      label.textContent = 'NO TOKEN';
    }
  }

  // ── Toast ──
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  // Close modal on background tap
  document.getElementById('modalBg').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  // iOS requires playback to be triggered by a user gesture — the button tap handles this automatically.
</script>
</body>
</html>
